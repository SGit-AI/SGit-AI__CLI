name: CI Pipeline (Base)

on:
  workflow_call:
    inputs:
      git_branch:
        required: true
        type: string
      release_type:
        required: false
        type: string
        default: ""
      should_increment_tag:
        required: false
        type: boolean
        default: false
      should_publish_pypi:
        required: false
        type: boolean
        default: false
      should_publish_dockerhub:
        required: false
        type: boolean
        default: false

env:
  PACKAGE_NAME: 'sgit_ai'
  GIT__BRANCH : ${{ inputs.git_branch }}

jobs:
  run-tests:
    name: "Run Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "run-tests"
        uses: ./.github/actions/pytest__run-tests
        with:
          test_target: "tests/unit"
          parallel: "true"

  run-integration-tests:
    name: "Run Integration Tests"
    runs-on: ubuntu-latest
    needs: [run-tests]
    steps:
      - uses: actions/checkout@v4

      - name: "run-integration-tests"
        uses: ./.github/actions/pytest__run-tests
        with:
          test_target: "tests/integration"
          python_version: "3.12"
          parallel: "false"
          extra_packages: "sgraph-ai-app-send"

  run-qa-tests:
    name: "Run QA Scenario Tests"
    runs-on: ubuntu-latest
    needs: [run-tests]
    steps:
      - uses: actions/checkout@v4

      - name: "run-qa-tests"
        uses: ./.github/actions/pytest__run-tests
        with:
          test_target: "-m qa tests/qa"
          python_version: "3.11"
          parallel: "false"

  run-mutation-tests:
    name: "Run Mutation Tests"
    runs-on: ubuntu-latest
    needs: [run-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # worktree needs full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mutation suite
        run: python tests/mutation/run_mutations.py --report mutation-report.json

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: mutation-report.json

  increment-tag:
    name: Increment Tag
    runs-on: ubuntu-latest
    needs: [run-tests, run-integration-tests, run-qa-tests, run-mutation-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Increment Tag
        if: inputs.should_increment_tag
        uses: owasp-sbot/OSBot-GitHub-Actions/.github/actions/git__increment-tag@dev
        with:
          release_type: ${{ inputs.release_type }}

  publish-to-pypi:
    if: inputs.should_publish_pypi && needs.increment-tag.result == 'success'
    name: "Publish to: PYPI"
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    needs: [increment-tag]
    steps:
      - uses: actions/checkout@v4
      - name: Git Update Current Branch
        uses: owasp-sbot/OSBot-GitHub-Actions/.github/actions/git__update_branch@dev
      - name: publish-to-pypi
        uses: owasp-sbot/OSBot-GitHub-Actions/.github/actions/pypi__publish@dev

  publish-to-dockerhub:
    if: inputs.should_publish_dockerhub && needs.publish-to-pypi.result == 'success'
    name: "Publish to: Docker Hub"
    runs-on: ubuntu-latest
    needs: [publish-to-pypi]
    steps:
      - uses: actions/checkout@v4

      - name: Git Update Current Branch
        uses: owasp-sbot/OSBot-GitHub-Actions/.github/actions/git__update_branch@dev

      - name: Build wheel
        run: |
          pip install --quiet build
          python -m build --wheel --outdir docker/dist/

      - name: Read version from wheel
        id: version
        run: |
          WHL=$(ls docker/dist/sgit_ai-*.whl | head -1)
          VER=$(basename "$WHL" | cut -d'-' -f2)
          echo "tag=v${VER}" >> $GITHUB_OUTPUT
          echo "Detected version: v${VER}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            diniscruz/sgit-ai:latest
            diniscruz/sgit-ai:${{ steps.version.outputs.tag }}
